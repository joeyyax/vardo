version = "1"
name = "postgres"
displayName = "PostgreSQL"
description = "Powerful open-source relational database"
icon = "https://cdn.simpleicons.org/postgresql/4169E1"
category = "database"
source = "direct"
deployType = "image"
imageName = "postgres:16"
defaultPort = 5432

[[envVars]]
key = "POSTGRES_PASSWORD"
description = "Superuser password"
required = true

[[envVars]]
key = "POSTGRES_USER"
description = "Superuser name"
required = false
defaultValue = "postgres"

[[envVars]]
key = "POSTGRES_DB"
description = "Default database name"
required = false
defaultValue = "postgres"

[[envVars]]
key = "DATABASE_URL"
description = "Connection string (auto-generated)"
required = false
defaultValue = "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${project.name}:5432/${POSTGRES_DB}"

[[volumes]]
name = "data"
mountPath = "/var/lib/postgresql/data"
description = "PostgreSQL data files"

[[connectionInfo]]
label = "Host"
value = "${project.name}"
copyRef = "HOST"

[[connectionInfo]]
label = "Port"
value = "5432"

[[connectionInfo]]
label = "Username"
value = "${POSTGRES_USER}"
copyRef = "POSTGRES_USER"

[[connectionInfo]]
label = "Password"
value = "${POSTGRES_PASSWORD}"
copyRef = "POSTGRES_PASSWORD"

[[connectionInfo]]
label = "Database"
value = "${POSTGRES_DB}"
copyRef = "POSTGRES_DB"

[[connectionInfo]]
label = "Connection URL"
value = "${DATABASE_URL}"
copyRef = "DATABASE_URL"
