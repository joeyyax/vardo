version = "2"
name = "ghost"
displayName = "Ghost + MySQL"
description = "Professional publishing platform with a dedicated MySQL 8 database"
icon = "https://cdn.simpleicons.org/ghost"
category = "web"
source = "direct"
deployType = "compose"
defaultPort = 2368

composeContent = """
services:
  ghost:
    image: ghost:latest
    depends_on:
      - mysql
    env_file:
      - .env
    volumes:
      - ghost-content:/var/lib/ghost/content

  mysql:
    image: mysql:8
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  ghost-content: {}
  mysql-data: {}
"""

[[envVars]]
key = "url"
description = "Public URL of your Ghost site"
required = true
defaultValue = "${project.url}"

[[envVars]]
key = "database__client"
description = "Database client"
required = false
defaultValue = "mysql"

[[envVars]]
key = "database__connection__host"
description = "Database hostname (compose service name)"
required = true
defaultValue = "mysql"

[[envVars]]
key = "database__connection__port"
description = "Database port"
required = false
defaultValue = "3306"

[[envVars]]
key = "database__connection__user"
description = "Database username"
required = true
defaultValue = "ghost"

[[envVars]]
key = "database__connection__password"
description = "Database password"
required = true

[[envVars]]
key = "database__connection__database"
description = "Database name"
required = true
defaultValue = "ghost"

[[envVars]]
key = "MYSQL_ROOT_PASSWORD"
description = "MySQL root password"
required = true

[[envVars]]
key = "MYSQL_DATABASE"
description = "MySQL database to create on startup"
required = false
defaultValue = "ghost"

[[envVars]]
key = "MYSQL_USER"
description = "MySQL user to create on startup"
required = false
defaultValue = "ghost"

[[envVars]]
key = "MYSQL_PASSWORD"
description = "MySQL user password (should match database__connection__password)"
required = false
defaultValue = "${database__connection__password}"

[[volumes]]
name = "ghost-content"
mountPath = "/var/lib/ghost/content"
description = "Ghost content, themes, and images"

[[volumes]]
name = "mysql-data"
mountPath = "/var/lib/mysql"
description = "MySQL data files"
