name = "plausible"
displayName = "Plausible Analytics"
description = "Privacy-friendly web analytics"
icon = "https://cdn.simpleicons.org/plausibleanalytics/5850EC"
category = "monitoring"
source = "git"
deployType = "compose"
gitUrl = "https://github.com/plausible/community-edition.git"
gitBranch = "main"
defaultPort = 8000

[[envVars]]
key = "BASE_URL"
description = "Public URL of your Plausible instance"
required = true

[[envVars]]
key = "SECRET_KEY_BASE"
description = "Secret key for encryption"
required = true
