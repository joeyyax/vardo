# NVIDIA GPU override for cAdvisor.
#
# Passes NVIDIA device nodes into the cAdvisor container so it can read GPU
# utilization via NVML. Only include this file on hosts with an NVIDIA driver
# installed — Docker will reject the container start if the device nodes don't
# exist on the host.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Multi-GPU hosts: add /dev/nvidia1, /dev/nvidia2, etc. for each additional GPU.

services:
  cadvisor:
    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia0:/dev/nvidia0
