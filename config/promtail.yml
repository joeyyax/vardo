server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers with the host.managed label
      - source_labels: ["__meta_docker_container_label_host_managed"]
        regex: "true"
        action: keep
      # Extract Host labels
      - source_labels: ["__meta_docker_container_label_host_project"]
        target_label: project
      - source_labels: ["__meta_docker_container_label_host_project_id"]
        target_label: project_id
      - source_labels: ["__meta_docker_container_label_host_environment"]
        target_label: environment
      # Compose metadata
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
