server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Resolve managed flag — vardo.managed takes priority, fall back to host.managed (legacy)
      - source_labels: ["__meta_docker_container_label_host_managed"]
        target_label: __tmp_managed
      - source_labels: ["__meta_docker_container_label_vardo_managed"]
        regex: "(.+)"
        target_label: __tmp_managed
      # Only scrape containers where managed=true
      - source_labels: ["__tmp_managed"]
        regex: "true"
        action: keep
      # Extract project label — vardo.project takes priority, fall back to host.project
      - source_labels: ["__meta_docker_container_label_host_project"]
        target_label: project
      - source_labels: ["__meta_docker_container_label_vardo_project"]
        regex: "(.+)"
        target_label: project
      # Extract project_id label — vardo.project.id takes priority, fall back to host.project.id
      - source_labels: ["__meta_docker_container_label_host_project_id"]
        target_label: project_id
      - source_labels: ["__meta_docker_container_label_vardo_project_id"]
        regex: "(.+)"
        target_label: project_id
      # Extract environment label — vardo.environment takes priority, fall back to host.environment
      - source_labels: ["__meta_docker_container_label_host_environment"]
        target_label: environment
      - source_labels: ["__meta_docker_container_label_vardo_environment"]
        regex: "(.+)"
        target_label: environment
      # Compose metadata
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
