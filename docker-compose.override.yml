# docker-compose.override.yml — Dev overrides (auto-merged by `docker compose up`).
#
# - Removes the host service (run `pnpm dev` instead)
# - Exposes service ports to localhost for direct access
# - Disables TLS / ACME (uses insecure Traefik dashboard)
# - Attaches all services to host-network so localhost can reach them

services:
  # Disable the host app in dev — use `pnpm dev` instead.
  # Setting profiles to a non-active profile effectively removes it.
  host:
    profiles:
      - production

  postgres:
    environment:
      POSTGRES_PASSWORD: host
    ports:
      - "5433:5432"
    networks:
      - internal
      - host-network

  redis:
    ports:
      - "6379:6379"
    networks:
      - internal
      - host-network

  cadvisor:
    ports:
      - "8081:8080"
    networks:
      - internal
      - host-network

  loki:
    ports:
      - "3100:3100"
    networks:
      - internal
      - host-network

  promtail:
    networks:
      - internal
      - host-network

  traefik:
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=host-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels: []
