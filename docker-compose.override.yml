# docker-compose.override.yml — Dev overrides.
#
# Docker Compose automatically merges this file on top of docker-compose.yml
# whenever it exists in the same directory. This is a built-in Docker
# convention — no flags needed, just `docker compose up -d`.
#
# This file only exists in the dev checkout, not on production servers.
# It does the following:
#   - Disables the app container (run `pnpm dev` instead)
#   - Exposes service ports to localhost (postgres:5433, redis:6379, etc.)
#   - Disables TLS (uses insecure Traefik dashboard)
#   - Attaches services to vardo-network so your local dev server can reach them

services:
  # Disable the host app in dev — use `pnpm dev` instead.
  # Setting profiles to a non-active profile effectively removes it.
  host:
    profiles:
      - production

  postgres:
    environment:
      POSTGRES_PASSWORD: host
    ports:
      - "5433:5432"
    networks:
      - internal
      - vardo-network

  redis:
    ports:
      - "6379:6379"
    networks:
      - internal
      - vardo-network

  cadvisor:
    ports:
      - "8081:8080"
    networks:
      - internal
      - vardo-network

  loki:
    ports:
      - "3100:3100"
    networks:
      - internal
      - vardo-network

  promtail:
    networks:
      - internal
      - vardo-network

  traefik:
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=vardo-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels: []
