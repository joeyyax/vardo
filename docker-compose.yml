name: vardo

# Single compose file for all environments.
#
#   Dev:   ENV=dev docker compose up -d
#          Starts everything except the app container. Run the app with `pnpm dev`.
#
#   Prod:  docker compose up -d
#          ENV defaults to "production" — all services start, ACME enabled.

services:
  host:
    build:
      context: .
      args:
        NEXT_PUBLIC_BETTER_AUTH_URL: https://${VARDO_DOMAIN:-localhost}
        NEXT_PUBLIC_APP_URL: https://${VARDO_DOMAIN:-localhost}
        NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
        NEXT_PUBLIC_PLAUSIBLE_SRC: ${NEXT_PUBLIC_PLAUSIBLE_SRC:-}
    profiles:
      - production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://host:${DB_PASSWORD:-host}@postgres:5432/host
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_BETTER_AUTH_URL: https://${VARDO_DOMAIN:-localhost}
      NEXT_PUBLIC_APP_URL: https://${VARDO_DOMAIN:-localhost}
      VARDO_PROJECTS_DIR: /var/lib/host/projects
      CADVISOR_URL: http://cadvisor:8080
      LOKI_URL: http://loki:3100
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - host_projects:/var/lib/host/projects
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vardo.rule=Host(`${VARDO_DOMAIN:-localhost}`)"
      - "traefik.http.routers.vardo.entrypoints=websecure"
      - "traefik.http.routers.vardo.tls.certresolver=le"
      - "traefik.http.services.vardo.loadbalancer.server.port=3000"
    networks:
      - internal
      - vardo-network

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: host
      POSTGRES_PASSWORD: ${DB_PASSWORD:-host}
      POSTGRES_DB: host
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U host"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - vardo-network

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - vardo-network

  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=vardo-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-WARN}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - vardo-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    privileged: true
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal
      - vardo-network

  loki:
    image: grafana/loki:3.4
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./config/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - internal
      - vardo-network
    mem_limit: 512m

  promtail:
    image: grafana/promtail:3.4
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./config/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - internal
      - vardo-network
    mem_limit: 128m

volumes:
  postgres_data:
  redis_data:
  host_projects:
  letsencrypt:
  loki_data:

networks:
  internal:
  vardo-network:
    external: true
