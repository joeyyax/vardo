name: vardo

# Single compose file for all environments.
#
#   Dev:    docker compose up -d
#           App container skipped (no production profile). Run the app with `pnpm dev`.
#
#   Prod:   docker compose up -d
#           install.sh sets COMPOSE_PROFILES=production — all services start.
#
#   GPU:    COMPOSE_PROFILES=gpu docker compose up -d  (or production,gpu)
#           Activates the cadvisor-gpu service, which passes NVIDIA device nodes
#           into cAdvisor for GPU metrics collection via NVML. Requires NVIDIA
#           drivers and nvidia-container-toolkit on the host.

x-cadvisor: &cadvisor
  image: gcr.io/cadvisor/cadvisor:latest
  restart: unless-stopped
  privileged: true
  ports:
    - "${CADVISOR_PORT:-7300}:8080"
  volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
  networks:
    - internal
    - vardo-network

services:
  frontend:
    container_name: vardo-frontend
    build:
      context: .
      args:
        NEXT_PUBLIC_BETTER_AUTH_URL: https://${VARDO_DOMAIN:-localhost}
        NEXT_PUBLIC_APP_URL: https://${VARDO_DOMAIN:-localhost}
        NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
        NEXT_PUBLIC_PLAUSIBLE_SRC: ${NEXT_PUBLIC_PLAUSIBLE_SRC:-}
        GIT_SHA: ${GIT_SHA:-}
    profiles:
      - production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      wireguard:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://host:${DB_PASSWORD:-host}@vardo-postgres:5432/host
      REDIS_URL: redis://vardo-redis:6379
      NEXT_PUBLIC_BETTER_AUTH_URL: https://${VARDO_DOMAIN:-localhost}
      NEXT_PUBLIC_APP_URL: https://${VARDO_DOMAIN:-localhost}
      VARDO_PROJECTS_DIR: /var/lib/vardo/projects
      CADVISOR_URL: http://vardo-cadvisor:8080
      LOKI_URL: http://vardo-loki:3100
      WIREGUARD_GATEWAY: 10.88.0.2
      DOCKER_GID: ${DOCKER_GID:-999}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    cap_add:
      - NET_ADMIN
    group_add:
      - ${DOCKER_GID:-999}
    volumes:
      # Docker socket — required for the deploy engine and admin restart endpoint.
      # Accepted risk: mounting the socket grants this container full control over
      # the host daemon. Mitigated by admin-only auth, non-root user, and docker GID mapping.
      # Set CONTAINER_ID in .env if you run Vardo with a custom container hostname.
      - /var/run/docker.sock:/var/run/docker.sock
      # Vardo directory — required for stack self-management (update, restart services).
      - ${VARDO_DIR:-.}:/vardo:rw
      # Projects directory — managed compose projects storage.
      - ${VARDO_PROJECTS:-/var/lib/vardo/projects}:/var/lib/vardo/projects
      - traefik_dynamic:/etc/traefik/dynamic
      # Additional mounts — configurable via admin panel for external project access.
      - ${VARDO_MOUNT_1:-/dev/null}:${VARDO_MOUNT_1:-/dev/null}:ro
      - ${VARDO_MOUNT_2:-/dev/null}:${VARDO_MOUNT_2:-/dev/null}:ro
      - ${VARDO_MOUNT_3:-/dev/null}:${VARDO_MOUNT_3:-/dev/null}:ro
    labels:
      - "traefik.enable=true"
      # Primary router — domain with TLS
      - "traefik.http.routers.vardo.rule=Host(`${VARDO_DOMAIN:-localhost}`)"
      - "traefik.http.routers.vardo.entrypoints=websecure"
      - "traefik.http.routers.vardo.tls.certresolver=le"
      - "traefik.http.services.vardo.loadbalancer.server.port=3000"
      # HTTP→HTTPS redirect for the domain (not for IP)
      - "traefik.http.routers.vardo-http.rule=Host(`${VARDO_DOMAIN:-localhost}`)"
      - "traefik.http.routers.vardo-http.entrypoints=web"
      - "traefik.http.routers.vardo-http.middlewares=vardo-https-redirect"
      - "traefik.http.middlewares.vardo-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.vardo-https-redirect.redirectscheme.permanent=true"
      # Fallback routers — catch-all for IP access (setup before DNS)
      - "traefik.http.routers.vardo-fallback.rule=PathPrefix(`/`)"
      - "traefik.http.routers.vardo-fallback.entrypoints=web"
      - "traefik.http.routers.vardo-fallback.priority=1"
      - "traefik.http.routers.vardo-fallback.service=vardo"
      # HTTPS fallback — self-signed cert (Traefik default), user accepts warning
      - "traefik.http.routers.vardo-fallback-https.rule=PathPrefix(`/`)"
      - "traefik.http.routers.vardo-fallback-https.entrypoints=websecure"
      - "traefik.http.routers.vardo-fallback-https.priority=1"
      - "traefik.http.routers.vardo-fallback-https.tls=true"
      - "traefik.http.routers.vardo-fallback-https.service=vardo"
      # Unknown-host assets — serve /_next without path rewrite so CSS/JS loads correctly
      - "traefik.http.routers.vardo-unknown-host-assets.rule=HostRegexp(`.*[a-zA-Z].*`) && PathPrefix(`/_next`)"
      - "traefik.http.routers.vardo-unknown-host-assets.entrypoints=websecure"
      - "traefik.http.routers.vardo-unknown-host-assets.tls=true"
      - "traefik.http.routers.vardo-unknown-host-assets.priority=3"
      - "traefik.http.routers.vardo-unknown-host-assets.service=vardo"
      - "traefik.http.routers.vardo-unknown-host-assets-http.rule=HostRegexp(`.*[a-zA-Z].*`) && PathPrefix(`/_next`)"
      - "traefik.http.routers.vardo-unknown-host-assets-http.entrypoints=web"
      - "traefik.http.routers.vardo-unknown-host-assets-http.priority=3"
      - "traefik.http.routers.vardo-unknown-host-assets-http.service=vardo"
      # Unknown-host router — catches unrecognized hostnames and shows service-not-found page
      # Regex requires at least one letter, so raw IP access falls through to vardo-fallback-https
      - "traefik.http.routers.vardo-unknown-host.rule=HostRegexp(`.*[a-zA-Z].*`)"
      - "traefik.http.routers.vardo-unknown-host.entrypoints=websecure"
      - "traefik.http.routers.vardo-unknown-host.tls=true"
      - "traefik.http.routers.vardo-unknown-host.priority=2"
      - "traefik.http.routers.vardo-unknown-host.service=vardo"
      - "traefik.http.routers.vardo-unknown-host.middlewares=vardo-unknown-host-path"
      - "traefik.http.middlewares.vardo-unknown-host-path.replacepathregex.regex=^/.*$$"
      - "traefik.http.middlewares.vardo-unknown-host-path.replacepathregex.replacement=/unknown-host"
      # Unknown-host router (HTTP) — mirrors HTTPS behavior on port 80 for unknown hostnames
      - "traefik.http.routers.vardo-unknown-host-http.rule=HostRegexp(`.*[a-zA-Z].*`)"
      - "traefik.http.routers.vardo-unknown-host-http.entrypoints=web"
      - "traefik.http.routers.vardo-unknown-host-http.priority=2"
      - "traefik.http.routers.vardo-unknown-host-http.service=vardo"
      - "traefik.http.routers.vardo-unknown-host-http.middlewares=vardo-unknown-host-path"
    networks:
      internal:
      mesh:
        ipv4_address: 10.88.0.3
      vardo-network:

  postgres:
    container_name: vardo-postgres
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: host
      POSTGRES_PASSWORD: ${DB_PASSWORD:-host}
      POSTGRES_DB: host
    ports:
      - "${POSTGRES_PORT:-7100}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U host"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    container_name: vardo-redis
    image: redis/redis-stack-server:7.4.0-v3
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-7200}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  traefik:
    container_name: vardo-traefik
    image: traefik:v3
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--accesslog.fields.headers.defaultmode=drop"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${TRAEFIK_DOCKER_NETWORK-vardo-network}"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # Let's Encrypt (default, always available)
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme-le.json"
      # Let's Encrypt — DNS-01 challenge (Cloudflare; requires CF_DNS_API_TOKEN)
      - "--certificatesresolvers.le-dns.acme.dnschallenge=true"
      - "--certificatesresolvers.le-dns.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.le-dns.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.le-dns.acme.storage=/letsencrypt/acme-le-dns.json"
      # Google Trust Services (free, no EAB required)
      - "--certificatesresolvers.google.acme.tlschallenge=true"
      - "--certificatesresolvers.google.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.google.acme.caserver=https://dv.acme-v02.api.pki.goog/directory"
      - "--certificatesresolvers.google.acme.storage=/letsencrypt/acme-google.json"
      # Google Trust Services — DNS-01 challenge (Cloudflare; requires CF_DNS_API_TOKEN)
      - "--certificatesresolvers.google-dns.acme.dnschallenge=true"
      - "--certificatesresolvers.google-dns.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.google-dns.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.google-dns.acme.caserver=https://dv.acme-v02.api.pki.goog/directory"
      - "--certificatesresolvers.google-dns.acme.storage=/letsencrypt/acme-google-dns.json"
      # ZeroSSL (requires EAB credentials — non-functional until configured)
      - "--certificatesresolvers.zerossl.acme.tlschallenge=true"
      - "--certificatesresolvers.zerossl.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.zerossl.acme.caserver=https://acme.zerossl.com/v2/DV90"
      - "--certificatesresolvers.zerossl.acme.eab.kid=${ZEROSSL_EAB_KID:-}"
      - "--certificatesresolvers.zerossl.acme.eab.hmacencoded=${ZEROSSL_EAB_HMAC:-}"
      - "--certificatesresolvers.zerossl.acme.storage=/letsencrypt/acme-zerossl.json"
      # ZeroSSL — DNS-01 challenge (Cloudflare; requires CF_DNS_API_TOKEN + EAB credentials)
      - "--certificatesresolvers.zerossl-dns.acme.dnschallenge=true"
      - "--certificatesresolvers.zerossl-dns.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.zerossl-dns.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.zerossl-dns.acme.caserver=https://acme.zerossl.com/v2/DV90"
      - "--certificatesresolvers.zerossl-dns.acme.eab.kid=${ZEROSSL_EAB_KID:-}"
      - "--certificatesresolvers.zerossl-dns.acme.eab.hmacencoded=${ZEROSSL_EAB_HMAC:-}"
      - "--certificatesresolvers.zerossl-dns.acme.storage=/letsencrypt/acme-zerossl-dns.json"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-WARN}"
    environment:
      # Required for DNS-01 challenge with Cloudflare. Set in .env when using DNS challenge.
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
      - traefik_dynamic:/etc/traefik/dynamic
    networks:
      - vardo-network

  cadvisor:
    <<: *cadvisor
    container_name: vardo-cadvisor
    profiles: ["!gpu"]

  # GPU variant — passes NVIDIA device nodes into cAdvisor for NVML-based GPU metrics.
  # Activate with: COMPOSE_PROFILES=gpu docker compose up -d
  # Multi-GPU hosts: add /dev/nvidia1, /dev/nvidia2, etc. as needed.
  cadvisor-gpu:
    <<: *cadvisor
    container_name: vardo-cadvisor
    profiles: [gpu]
    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia0:/dev/nvidia0

  loki:
    container_name: vardo-loki
    image: grafana/loki:3.4
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "${LOKI_PORT:-7400}:3100"
    volumes:
      - ./config/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - internal
    mem_limit: 512m

  wireguard:
    container_name: vardo-wireguard
    image: linuxserver/wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      # SYS_MODULE needed on kernels without wireguard built in (pre-5.6).
      # Safe to remove on Ubuntu 20.04+, Debian 11+, modern Docker Desktop.
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - "${WIREGUARD_PORT:-51820}:51820/udp"
    volumes:
      - wireguard_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 2>/dev/null | grep -q 'interface' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      internal:
      mesh:
        ipv4_address: 10.88.0.2
      vardo-network:
    mem_limit: 64m

  promtail:
    container_name: vardo-promtail
    image: grafana/promtail:3.4
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./config/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - internal
    mem_limit: 128m

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  loki_data:
  wireguard_config:
  traefik_dynamic:

networks:
  internal:
  mesh:
    ipam:
      config:
        - subnet: 10.88.0.0/24
  vardo-network:
    external: true
